<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Default" />

<f:section name="main">
    <div class="faq-search">
        <f:form action="search" method="get" class="faq-search__form" role="search">
            <div class="faq-search__input-group">
                <label class="faq-search__label" for="faq-search-input">
                    <f:translate key="LLL:EXT:faq/Resources/Private/Language/locallang.xlf:search.label" />
                </label>
                <input class="faq-search__input"
                       type="search"
                       id="faq-search-input"
                       name="tx_maifaq_search[searchWord]"
                       value="{searchWord}"
                       placeholder="{f:translate(key: 'LLL:EXT:faq/Resources/Private/Language/locallang.xlf:search.placeholder')}"
                       autocomplete="off" />
                <button class="faq-search__submit" type="submit">
                    <f:translate key="LLL:EXT:faq/Resources/Private/Language/locallang.xlf:search.submit" />
                </button>
            </div>
        </f:form>

        <f:if condition="{searchWord}">
            <div class="faq-search__results" role="region" aria-live="polite">
                <f:if condition="{entries -> f:count()} > 0">
                    <f:then>
                        <p class="faq-search__results-count">
                            <f:translate key="LLL:EXT:faq/Resources/Private/Language/locallang.xlf:search.resultsCount"
                                         arguments="{0: '{entries -> f:count()}', 1: '{searchWord}'}" />
                        </p>
                        <dl class="faq-search__list">
                            <f:for each="{entries}" as="entry">
                                <div class="faq-search__item">
                                    <dt class="faq-search__question">
                                        <button class="faq-accordion__toggle"
                                                type="button"
                                                aria-expanded="false"
                                                aria-controls="faq-search-answer-{entry.uid}">
                                            {entry.question}
                                        </button>
                                    </dt>
                                    <dd class="faq-search__answer"
                                        id="faq-search-answer-{entry.uid}"
                                        hidden="hidden">
                                        <f:format.html>{entry.answer}</f:format.html>
                                    </dd>
                                </div>
                            </f:for>
                        </dl>
                    </f:then>
                    <f:else>
                        <p class="faq-search__no-results">
                            <f:translate key="LLL:EXT:faq/Resources/Private/Language/locallang.xlf:search.noResults"
                                         arguments="{0: searchWord}" />
                        </p>
                    </f:else>
                </f:if>
            </div>
        </f:if>
    </div>
</f:section>

</html>
