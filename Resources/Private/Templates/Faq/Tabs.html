<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Default" />

<f:section name="main">
    <div class="faq-tabs">
        <f:if condition="{categories -> f:count()} > 0">
            <f:then>
                <nav class="faq-tabs__nav" role="tablist" aria-label="{f:translate(key: 'LLL:EXT:faq/Resources/Private/Language/locallang.xlf:tabs.navLabel')}">
                    <f:for each="{categories}" as="category" iteration="i">
                        <button class="faq-tabs__tab{f:if(condition: i.isFirst, then: ' faq-tabs__tab--active')}"
                                type="button"
                                role="tab"
                                id="faq-tab-{category.uid}"
                                aria-controls="faq-panel-{category.uid}"
                                aria-selected="{f:if(condition: i.isFirst, then: 'true', else: 'false')}">
                            {category.title}
                        </button>
                    </f:for>
                </nav>

                <div class="faq-tabs__panels">
                    <f:for each="{categories}" as="category" iteration="i">
                        <div class="faq-tabs__panel{f:if(condition: i.isFirst, then: ' faq-tabs__panel--active')}"
                             id="faq-panel-{category.uid}"
                             role="tabpanel"
                             aria-labelledby="faq-tab-{category.uid}"
                             {f:if(condition: '!i.isFirst', then: 'hidden="hidden"')}>
                            <f:if condition="{entriesByCategory.{category.uid}.entries -> f:count()} > 0">
                                <f:then>
                                    <dl class="faq-tabs__entry-list">
                                        <f:for each="{entriesByCategory.{category.uid}.entries}" as="entry">
                                            <div class="faq-tabs__entry">
                                                <dt class="faq-tabs__question">
                                                    <button class="faq-accordion__toggle"
                                                            type="button"
                                                            aria-expanded="false"
                                                            aria-controls="faq-tab-answer-{entry.uid}">
                                                        {entry.question}
                                                    </button>
                                                </dt>
                                                <dd class="faq-tabs__answer"
                                                    id="faq-tab-answer-{entry.uid}"
                                                    hidden="hidden">
                                                    <f:format.html>{entry.answer}</f:format.html>
                                                </dd>
                                            </div>
                                        </f:for>
                                    </dl>
                                </f:then>
                                <f:else>
                                    <p class="faq-tabs__empty">
                                        <f:translate key="LLL:EXT:faq/Resources/Private/Language/locallang.xlf:tabs.noEntries" />
                                    </p>
                                </f:else>
                            </f:if>
                        </div>
                    </f:for>
                </div>
            </f:then>
            <f:else>
                <p class="faq-tabs__no-categories">
                    <f:translate key="LLL:EXT:faq/Resources/Private/Language/locallang.xlf:tabs.noCategories" />
                </p>
            </f:else>
        </f:if>
    </div>
</f:section>

</html>
